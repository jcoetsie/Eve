name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: "Eves.Zelfstandig.Werk.exe"
            build_cmd: pyinstaller --onefile --windowed --name "Eves Zelfstandig Werk" zelfstandig_werk_app.py
            asset_path: dist/Eves Zelfstandig Werk.exe
            asset_name: Eves.Zelfstandig.Werk.exe

          - os: macos-latest
            artifact: "Eves.Zelfstandig.Werk.app.zip"
            build_cmd: pyinstaller --onefile --windowed --name "Eves Zelfstandig Werk" zelfstandig_werk_app.py
            asset_path: Eves.Zelfstandig.Werk.app.zip
            asset_name: Eves.Zelfstandig.Werk.app.zip

          - os: ubuntu-latest
            artifact: "Eves.Zelfstandig.Werk.linux"
            build_cmd: pyinstaller --onefile --name "Eves Zelfstandig Werk" zelfstandig_werk_app.py
            asset_path: dist/Eves Zelfstandig Werk
            asset_name: Eves.Zelfstandig.Werk.linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Zip macOS .app bundle
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r "../Eves.Zelfstandig.Werk.app.zip" "Eves Zelfstandig Werk.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Eves.Zelfstandig.Werk.exe/Eves Zelfstandig Werk.exe
            artifacts/Eves.Zelfstandig.Werk.app.zip/Eves.Zelfstandig.Werk.app.zip
            artifacts/Eves.Zelfstandig.Werk.linux/Eves Zelfstandig Werk
