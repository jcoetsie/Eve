name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows
            build_cmd: pyinstaller --onefile --windowed --name "Eves Zelfstandig Werk" zelfstandig_werk_app.py
            asset_path: dist/Eves Zelfstandig Werk.exe
            asset_name: Eves-Zelfstandig-Werk-Windows.exe

          - os: macos-latest
            artifact: macos
            build_cmd: pyinstaller --onefile --windowed --name "Eves Zelfstandig Werk" zelfstandig_werk_app.py
            asset_path: Eves-Zelfstandig-Werk-macOS.zip
            asset_name: Eves-Zelfstandig-Werk-macOS.zip

          - os: ubuntu-latest
            artifact: linux
            build_cmd: pyinstaller --onefile --name "Eves Zelfstandig Werk" zelfstandig_werk_app.py
            asset_path: dist/Eves Zelfstandig Werk
            asset_name: Eves-Zelfstandig-Werk-Linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Zip macOS .app bundle
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          xattr -cr "Eves Zelfstandig Werk.app"
          zip -r "../Eves-Zelfstandig-Werk-macOS.zip" "Eves Zelfstandig Werk.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Rename artifacts
        run: |
          mv "artifacts/windows/Eves Zelfstandig Werk.exe" "artifacts/Eves-Zelfstandig-Werk-Windows.exe"
          mv "artifacts/macos/Eves-Zelfstandig-Werk-macOS.zip" "artifacts/Eves-Zelfstandig-Werk-macOS.zip"
          mv "artifacts/linux/Eves Zelfstandig Werk" "artifacts/Eves-Zelfstandig-Werk-Linux"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Downloads

            | Platform | Download |
            |----------|----------|
            | 🪟 **Windows** | [Eves-Zelfstandig-Werk-Windows.exe](https://github.com/jcoetsie/Eve/releases/download/${{ github.ref_name }}/Eves-Zelfstandig-Werk-Windows.exe) |
            | 🍎 **macOS** | [Eves-Zelfstandig-Werk-macOS.zip](https://github.com/jcoetsie/Eve/releases/download/${{ github.ref_name }}/Eves-Zelfstandig-Werk-macOS.zip) |
            | 🐧 **Linux** | [Eves-Zelfstandig-Werk-Linux](https://github.com/jcoetsie/Eve/releases/download/${{ github.ref_name }}/Eves-Zelfstandig-Werk-Linux) |

            Dubbelklik op het gedownloade bestand om de app te openen. Geen installatie nodig.

            ---

            <details><summary>⚠️ <b>Beveiligingsmelding bij eerste keer openen?</b></summary>

            #### Windows: "Windows heeft uw pc beschermd"
            1. Klik op **"Meer info"**
            2. Klik op **"Toch uitvoeren"**

            #### macOS: "kan niet worden geopend"
            1. **Rechtermuisknop** (of Ctrl+klik) op de app
            2. Kies **"Open"** → klik nogmaals **"Open"**

            Dit is normaal voor gratis open source software. De broncode is volledig open en controleerbaar.
            </details>
          files: |
            artifacts/Eves-Zelfstandig-Werk-Windows.exe
            artifacts/Eves-Zelfstandig-Werk-macOS.zip
            artifacts/Eves-Zelfstandig-Werk-Linux
